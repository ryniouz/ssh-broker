{% extends "base.html" %}
{% block title %}Sign in — SSH Broker{% endblock %}
{% block auth %}
<div class="auth">
  <div class="auth-card">
    <div class="auth-logo"><img src="/static/logo.png" alt=""><span class="name">SSH Broker</span></div>
    <h1>Sign in</h1>
    <p class="sub">Admin console for your broker.</p>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <form method="post" action="/login">
      <label>Username<input name="username" autocomplete="username" required></label>
      <label>Password<input name="password" type="password" autocomplete="current-password" required></label>
      <button type="submit">Sign in</button>
    </form>
    <p class="hint">Need an account? <a href="/signup">Request access</a></p>
    {% include "_theme_toggle.html" %}
  </div>
</div>
{% endblock %}
