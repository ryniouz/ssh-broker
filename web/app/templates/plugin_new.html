{% extends "base.html" %}
{% block title %}New plugin — SSH Broker{% endblock %}
{% block body %}
<div class="page-h"><h1>New plugin</h1><p>Declare what an app may do. See the <a href="/manual">Manual</a> for the full schema and examples (Docker, GPU, sensors…).</p></div>
<section class="card">
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  <form method="post" action="/plugins/new">
    <div class="form-grid">
      <label>Name<input name="name" pattern="[a-z0-9-]+" placeholder="my-app" value="{{ form.name or '' }}" required></label>
      <label>Rate limit / min<input name="rate_limit_per_min" type="number" value="{{ form.rate or 60 }}" required></label>
      <label class="full">Description<input name="description" placeholder="what this app does" value="{{ form.description or '' }}"></label>
      <label class="full">Capabilities (JSON) — metrics, commands, upload
        <textarea name="capabilities_json" class="cloud-box" spellcheck="false">{{ form.capabilities }}</textarea>
      </label>
      <div class="actions">
        <button type="submit">Create plugin</button>
        <a href="/" class="btn btn-ghost">Cancel</a>
      </div>
    </div>
  </form>
</section>
{% endblock %}
